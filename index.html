<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>称骨算命</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    color: #e0d5c1;
    font-family: 'PingFang SC', 'Microsoft YaHei', 'SimHei', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  .title-wrap {
    text-align: center;
    margin-bottom: 24px;
  }
  .title-wrap h1 {
    font-size: 28px;
    color: #d4a04a;
    letter-spacing: 6px;
    margin-bottom: 4px;
  }
  .title-wrap .sub {
    font-size: 13px;
    color: #8a7a6a;
    letter-spacing: 2px;
  }

  .card {
    background: #2a2440;
    border: 1px solid #3d3455;
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 440px;
    margin-bottom: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .card-title {
    font-size: 15px;
    color: #d4a04a;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid #3d3455;
    letter-spacing: 1px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    align-items: center;
  }

  .input-row label {
    font-size: 13px;
    color: #a09080;
    width: 50px;
    flex-shrink: 0;
  }

  input, select {
    flex: 1;
    background: #1a1a2e;
    border: 1px solid #4a3d6a;
    border-radius: 8px;
    color: #e0d5c1;
    font-size: 14px;
    padding: 8px 12px;
    outline: none;
    font-family: inherit;
  }
  input:focus, select:focus {
    border-color: #d4a04a;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #d4a04a, #b8802a);
    color: #1a1a2e;
    font-weight: bold;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-secondary {
    background: #3d3455;
    color: #a09080;
  }
  .btn-secondary:hover { background: #4d4466; }

  .btn:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(212,160,74,0.3); }
  .btn:active { transform: translateY(0); }

  /* 结果卡片动画 */
  .result-card-animated {
    animation: fadeSlideUp 0.6s ease-out;
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result {
    display: none;
    margin-top: 16px;
  }
  .result.show { display: block; }

  .result-header {
    text-align: center;
    padding: 20px;
    background: linear-gradient(135deg, #2a1f3d, #1e1a30);
    border-radius: 12px;
    margin-bottom: 16px;
  }

  .bone-weight {
    font-size: 52px;
    font-weight: bold;
    color: #d4a04a;
    letter-spacing: 2px;
    line-height: 1;
    text-shadow: 0 0 20px rgba(212,160,74,0.5);
  }
  .bone-unit {
    font-size: 16px;
    color: #8a7a6a;
    margin-top: 4px;
  }
  .bone-label {
    font-size: 13px;
    color: #a09080;
    margin-top: 10px;
    letter-spacing: 1px;
  }

  .bazi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 14px 0;
  }
  .bazi-cell {
    background: #1a1a2e;
    border-radius: 8px;
    padding: 10px 4px;
    text-align: center;
  }
  .bazi-cell .label {
    font-size: 11px;
    color: #8a7a6a;
    margin-bottom: 4px;
  }
  .bazi-cell .pillar {
    font-size: 18px;
    color: #d4a04a;
    letter-spacing: 2px;
  }
  .bazi-cell .weight {
    font-size: 12px;
    color: #a09080;
    margin-top: 3px;
  }

  .commentary {
    background: #1a1a2e;
    border-radius: 10px;
    padding: 14px;
    font-size: 14px;
    color: #c0b090;
    line-height: 1.9;
    border-left: 3px solid #d4a04a;
  }

  .commentary-title {
    font-size: 14px;
    color: #d4a04a;
    margin-bottom: 8px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .tips {
    font-size: 12px;
    color: #6a5a4a;
    text-align: center;
    margin-top: 14px;
    line-height: 1.7;
  }

  /* Calendar toggle */
  .toggle-row {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-bottom: 16px;
  }
  .toggle-btn {
    padding: 6px 18px;
    border: 1px solid #4a3d6a;
    background: #1a1a2e;
    color: #8a7a6a;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .toggle-btn:first-child { border-radius: 8px 0 0 8px; }
  .toggle-btn:last-child { border-radius: 0 8px 8px 0; border-left: none; }
  .toggle-btn.active {
    background: #d4a04a;
    color: #1a1a2e;
    border-color: #d4a04a;
    font-weight: bold;
  }
  .toggle-btn:hover:not(.active) { background: #2a2440; }

  .section { display: none; }
  .section.active { display: block; }

/* ========== 易经占卦 ========== */
.hexagram-lines { display: flex; flex-direction: column; gap: 4px; align-items: center; margin: 10px 0; }
.hex-line { display: flex; justify-content: center; align-items: center; gap: 6px; }
.hex-line .line-label { font-size: 10px; color: #6a5a4a; width: 18px; text-align: right; }
.hex-line.old-yin { opacity: 0.7; }
.hex-line.old-yang { opacity: 0.7; }
.hex-line.changing .line-yang, .hex-line.changing .line-yin { box-shadow: 0 0 8px rgba(212,160,74,0.5); }
.line-yang { width: 80px; height: 8px; background: #d4a04a; border-radius: 2px; }
.line-yin { width: 80px; height: 8px; display: flex; gap: 12px; justify-content: center; }
.line-yin::before, .line-yin::after { content: ''; width: 30px; height: 8px; background: #d4a04a; border-radius: 2px; }
.hex-change-arrow { font-size: 24px; color: #d4a04a; margin: 0 12px; opacity: 0.6; }
.dual-hex { display: flex; justify-content: center; align-items: center; gap: 8px; flex-wrap: wrap; }
.hex-box { text-align: center; }
.hex-name { font-size: 18px; color: #d4a04a; letter-spacing: 2px; margin: 4px 0; }
.hex-num { font-size: 11px; color: #6a5a4a; }
.hex-judgment { font-size: 13px; color: #c0b098; line-height: 1.6; margin: 12px auto; max-width: 380px; text-align: center; }
.hex-judgment-label { font-size: 11px; color: #6a5a4a; margin-bottom: 4px; letter-spacing: 1px; }
.hex-divider { width: 60px; height: 1px; background: #3d3455; margin: 14px auto; }
.changing-info { font-size: 12px; color: #d4a04a; text-align: center; margin: 8px 0; padding: 6px 12px; background: #1a1a2e; border-radius: 8px; }
.hex-changed { font-size: 11px; color: #8a7a6a; text-align: center; margin-top: 4px; }
.btn-gua { background: linear-gradient(135deg, #8B4513, #a0522d); color: #f0e0c0; font-weight: bold; font-size: 18px; padding: 14px; letter-spacing: 4px; }
.btn-gua:hover { background: linear-gradient(135deg, #a0522d, #c07040); }

.num-slot {
  width: 72px; height: 72px;
  background: #1a1a2e;
  border: 2px solid #3d3455;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; font-weight: bold; color: #d4a04a;
  font-family: 'Courier New', monospace;
  transition: border-color 0.3s;
}
.num-slot.spinning { border-color: #d4a04a; animation: pulse-border 0.15s infinite; }
@keyframes pulse-border {
  0%, 100% { border-color: #d4a04a; }
  50% { border-color: #f0d080; }
}
.num-slot.stopped { border-color: #4a8a3a; }
.question-display {
  font-size: 13px; color: #e0d0c0;
  padding: 8px 12px; background: #1a1a2e;
  border-radius: 8px; margin-bottom: 12px;
  text-align: center; line-height: 1.4;
  border-left: 3px solid #d4a04a;
}
.question-label { font-size: 10px; color: #6a5a4a; margin-bottom: 3px; }

</style>
</head>
<body>

<div class="title-wrap">
  <h1>称骨算命</h1>
  <div class="sub">BRTH · FATE · WEIGHT</div>
</div>

<div class="card">
  <div class="card-title">输入出生信息</div>

  <div class="toggle-row">
    <button class="toggle-btn active" id="btn-female" onclick="setGender('female')">女命</button>
    <button class="toggle-btn" id="btn-male" onclick="setGender('male')">男命</button>
  </div>

  <div class="toggle-row">
    <button class="toggle-btn active" onclick="setMode('lunar', this)">按农历</button>
    <button class="toggle-btn" onclick="setMode('solar', this)">按公历</button>
  </div>

  <!-- 农历输入 -->
  <div id="sec-lunar" class="section active">
    <div class="input-row">
      <label>年</label>
      <select id="lyear"></select>
    </div>
    <div class="input-row">
      <label>月</label>
      <select id="lmonth"></select>
    </div>
    <div class="input-row">
      <label>日</label>
      <select id="lday"></select>
    </div>
    <div class="input-row">
      <label>时</label>
      <select id="lhour"></select>
    </div>
    <div class="tips" id="solar-hint" style="display:none"></div>
  </div>

  <!-- 公历输入 -->
  <div id="sec-solar" class="section">
    <div class="input-row">
      <label>年</label>
      <input type="number" id="syear" min="1900" max="2100" placeholder="例: 1990">
    </div>
    <div class="input-row">
      <label>月</label>
      <input type="number" id="smonth" min="1" max="12" placeholder="例: 8">
    </div>
    <div class="input-row">
      <label>日</label>
      <input type="number" id="sday" min="1" max="31" placeholder="例: 15">
    </div>
    <div class="input-row">
      <label>时</label>
      <select id="shour"></select>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-secondary" onclick="reset()">重置</button>
    <button class="btn btn-primary" onclick="calculate()">开始测算</button>
  </div>
</div>

<div class="card" id="result-card" style="display:none">
  <div class="card-title">测算结果</div>

  <div class="result-header">
    <div class="bone-weight" id="bone-weight">--</div>
    <div class="bone-unit">两 · 钱</div>
    <div class="bone-label" id="bone-level">-</div>
  </div>

  <div class="bazi-grid">
    <div class="bazi-cell">
      <div class="label">年柱</div>
      <div class="pillar" id="bz-year">--</div>
      <div class="weight" id="wt-year">--</div>
    </div>
    <div class="bazi-cell">
      <div class="label">月柱</div>
      <div class="pillar" id="bz-month">--</div>
      <div class="weight" id="wt-month">--</div>
    </div>
    <div class="bazi-cell">
      <div class="label">日柱</div>
      <div class="pillar" id="bz-day">--</div>
      <div class="weight" id="wt-day">--</div>
    </div>
    <div class="bazi-cell">
      <div class="label">时柱</div>
      <div class="pillar" id="bz-hour">--</div>
      <div class="weight" id="wt-hour">--</div>
    </div>
  </div>

  <div id="input-info" style="background:#1a1a2e;border-radius:8px;padding:10px 12px;font-size:12px;color:#a09080;line-height:1.8;margin-bottom:12px;"></div>

  <div class="commentary">
    <div class="commentary-title" id="cm-title">命理评语</div>
    <div id="cm-text"></div>
  </div>

  <div class="btn-row" style="margin-top:14px; flex-wrap: wrap; gap: 8px;">
    <button class="btn btn-primary" onclick="saveCard()">保存结果</button>
    <button class="btn btn-secondary" id="btn-copy" onclick="copyResult()">复制结果</button>
    <button class="btn btn-secondary" onclick="shareLink()">分享链接</button>
  </div>
</div>


<!-- 易经占卦 -->
<div class="card" id="gua-card">
  <div class="card-title">☰ 易经占卦 ☷</div>
  
  <div style="margin-bottom:14px;">
    <div style="font-size:12px;color:#8a7a6a;margin-bottom:6px;text-align:center;">默念您想问的事情，输入后摇卦</div>
    <textarea id="gua-question" rows="2" placeholder="请输入您想问的事情..." style="width:100%;background:#1a1a2e;border:1px solid #3d3455;border-radius:8px;padding:10px;color:#e0d0c0;font-family:inherit;resize:none;box-sizing:border-box;font-size:13px;"></textarea>
  </div>
  
  <div style="text-align:center;margin-bottom:10px;font-size:12px;color:#6a5a4a;">
    当前时辰：<span id="chen-name" style="color:#d4a04a;font-weight:bold;">辰时</span> 
    <span id="chen-range">(07:00-09:00)</span>
  </div>
  
  <div style="display:flex;justify-content:center;gap:14px;margin:10px 0 16px;">
    <div class="num-slot" id="slot1">-</div>
    <div class="num-slot" id="slot2">-</div>
    <div class="num-slot" id="slot3">-</div>
  </div>
  
  <div style="display:flex;gap:10px;">
    <button class="btn btn-gua" id="btn-start" onclick="alert(`点击成功！开始摇卦`);startGua()" style="flex:1;">开始摇卦</button>
    <button class="btn btn-gua" id="btn-stop" onclick="stopGua()" style="flex:1;display:none;background:linear-gradient(135deg,#c0392b,#b03a2e);">停！</button>
  </div>
  
  <div id="gua-result" class="result" style="margin-top:16px;display:none;">
    <div id="hex-display"></div>
    <div id="hex-judgment" class="hex-judgment"></div>
  </div>
</div>
/div>

// 根据干支查年柱干支（1900年起）
function getYearGanZhi(lunarYear) {
  const baseYear = 1900;
  const baseGZ = 36; // 1900=庚子 (天干庚=6, 地支子=0) -> index 36
  const offset = lunarYear - baseYear;
  if (offset < 0) return '庚子';
  const idx = (baseGZ + offset) % 60;
  const tiangan = TIANGAN[idx % 10];
  const dizhi = DIZHI[idx % 12];
  return tiangan + dizhi;
}

// 查指定年数据的闰月（0=无闰月）
function getLeapMonth(year) {
  const d = LUNAR_DATA.find(x => x.y === year);
  return d ? d.m : 0;
}

// 查指定年农历月份天数
function getLunarMonthDays(year, month) {
  const d = LUNAR_DATA.find(x => x.y === year);
  if (!d) return 29;
  const m = d.m;
  const lmd = d.lmd;
  // 月份索引：1-12，正月index=1，闰月index>12
  if (m > 0 && month > m) {
    // 过了闰月，月份要-1
    return Math.abs(lmd[month - 1]) || 29;
  }
  return Math.abs(lmd[month]) || 29;
}

// 公历日期 -> 农历日期
function solarToLunar(solarDate) {
  const year = solarDate.getFullYear();
  // 查找可能属于的农历年（本年或上一年）
  for (const tryYear of [year, year - 1]) {
    const d = LUNAR_DATA.find(x => x.y === tryYear);
    if (!d) continue;
    const newYear = new Date(d.y, d.sm - 1, d.m);
    // 该年结束边界
    const nextD = LUNAR_DATA.find(x => x.y === tryYear + 1);
    const end = nextD ? new Date(nextD.y, nextD.sm - 1, nextD.m) : new Date(d.y + 1, d.sm - 1, d.m + 400);
    if (solarDate >= newYear && solarDate < end) {
      const days = Math.floor((solarDate - newYear) / 86400000);
      return findLunarByDays(d, days);
    }
  }
  return null;
}

function findLunarByDays(d, daysFromNewYear) {
  let remaining = daysFromNewYear;
  const lm = d.m;
  const lmd = d.lmd;
  for (let i = 1; i <= 12; i++) {
    const monthDays = Math.abs(lmd[i] || 0);
    if (monthDays === 0) break;
    if (remaining < monthDays) {
      return { year: d.y, month: i, day: remaining + 1, isLeapMonth: false };
    }
    remaining -= monthDays;
    // 闰月处理：闰月跟随在某月之后
    if (lm > 0 && i === lm) {
      const leapDays = Math.abs(lmd[lm + 12] || 0);
      if (leapDays > 0) {
        if (remaining < leapDays) {
          return { year: d.y, month: i, day: remaining + 1, isLeapMonth: true };
        }
        remaining -= leapDays;
      }
    }
  }
  return null;
}

// 农历日期 -> 公历日期
function lunarToSolar(lYear, lMonth, lDay, isLeapMonth) {
  const d = LUNAR_DATA.find(x => x.y === lYear);
  if (!d) return null;

  const startMonth = d.sm; // 正月公历月份
  const startDay = d.m;    // 正月初一公历"日"

  // 计算从正月初一到 lMonth/lDay 的天数
  let days = 0;
  for (let m = 1; m < lMonth; m++) {
    days += getLunarMonthDays(lYear, m);
  }
  days += lDay - 1;

  // 加上闰月（如果闰月在当月之前）
  if (d.m > 0 && lMonth > d.m) {
    days += getLunarMonthDays(lYear, d.m + 12); // 闰月总天数
  }

  // 加上闰月的偏移
  if (isLeapMonth && d.m === lMonth) {
    days += getLunarMonthDays(lYear, lMonth);
  }

  // 基准日：公历 d.y 年 d.sm 月 d.mm 日（正月初一）
  const base = new Date(d.y, d.sm - 1, d.m);
  base.setDate(base.getDate() + days);
  return base;
}

// 计算八字
function getBazi(solarDate, hour) {
  // 简单八字排法（简化版，精确需专业历法库）
  const y = solarDate.getFullYear();
  const m = solarDate.getMonth() + 1;
  const d = solarDate.getDate();

  // 年柱
  const yearGZ = getYearGanZhi(y);

  // 月柱：需算月令地支
  const monthBase = (y % 100) * 0.12 + m;
  const monthIdx = Math.floor((monthBase + monthBase / 3) % 12);
  const monthGZ = TIANGAN[(TIANGAN.indexOf(yearGZ[0]) + 2) % 10] + DIZHI[monthIdx];

  // 日柱：简化公式（公历儒略日近似）
  const jd = Math.floor((y - 1) * 365.25 + m * 30.4375 + d + 8);
  const dayIdx = jd % 60;
  const dayGZ = TIANGAN[dayIdx % 10] + DIZHI[dayIdx % 12];

  // 时柱
  const hourIdx = Math.floor((hour + 1) / 2) % 12;
  const hourGZ = TIANGAN[(dayIdx % 10 + Math.floor(hourIdx / 2)) % 10] + DIZHI[hourIdx];

  return {
    year: yearGZ,
    month: monthGZ,
    day: dayGZ,
    hour: hourGZ,
    hourName: SHICHEN_NAME[hourIdx],
  };
}

// 计算骨重
function calcBoneWeight(bazi, lunarMonth, lunarDay) {
  const yw = YEAR_WEIGHT[bazi.year] || 1.0;
  const mw = LUNAR_MONTH_WEIGHT[lunarMonth] || 1.0;
  const dw = LUNAR_DAY_WEIGHT[lunarDay] || 1.0;
  const hw = HOUR_WEIGHT[bazi.hour[1]] || 1.0;
  return { yw, mw, dw, hw, total: yw + mw + dw + hw };
}

// 格式化为"X两X钱"
function formatWeight(w) {
  const liang = Math.floor(w);
  const qian = Math.round((w - liang) * 10);
  return `${liang}两${qian}钱`;
}

// 获取评语
function getComment(w) {
  const liang = Math.floor(w);
  const qian = Math.round((w - liang) * 10);
  const key = `${liang}两${qian}钱`;
  // 女命优先用 FEMALE_COMMENTS（官方歌诀）
  if (inputGender === 'female') {
    if (FEMALE_COMMENTS[key]) return '【女命歌诀】' + FEMALE_COMMENTS[key];
    // 女命未录入该骨重时退回通用评语
  }
  // 男命优先用 MALE_COMMENTS（官方歌诀）
  if (MALE_COMMENTS[key]) return '【男命歌诀】' + MALE_COMMENTS[key];
  // 男命或女命未命中时用通用评语
  if (COMMENTS[key]) return COMMENTS[key];
  if (liang === 4) return COMMENTS['4两以上'];
  if (liang >= 3) return COMMENTS['3两9钱'];
  if (liang === 2) return COMMENTS['2两9钱'];
  if (liang === 1 && qian >= 8) return COMMENTS['1两9钱'];
  if (liang === 1) return COMMENTS['1两' + qian + '钱'] || COMMENTS['1两'];
  return COMMENTS['1两'];
}

function calculate() {
  let birthDate, hour, solarMonth, lunarMonth, lunarDay, info = {};

  if (inputMode === 'lunar') {
    const year = parseInt(document.getElementById('lyear').value);
    const month = parseInt(document.getElementById('lmonth').value);
    const day = parseInt(document.getElementById('lday').value);
    hour = parseInt(document.getElementById('lhour').value);

    birthDate = lunarToSolar(year, month, day, false);
    if (!birthDate) {
      alert('日期超出范围，请尝试其他日期');
      return;
    }
    solarMonth = birthDate.getMonth() + 1;
    lunarMonth = month;  // 农历输入，月份就是农历月份
    lunarDay = day;
    info.inputLunar = `${year}年${month}月${day}日`;
    info.inputSolar = `${birthDate.getFullYear()}-${String(solarMonth).padStart(2,'0')}-${String(birthDate.getDate()).padStart(2,'0')}`;
  } else {
    const year = parseInt(document.getElementById('syear').value);
    const month = parseInt(document.getElementById('smonth').value);
    const day = parseInt(document.getElementById('sday').value);
    hour = parseInt(document.getElementById('shour').value);
    birthDate = new Date(year, month - 1, day);
    solarMonth = month;
    const lunar = solarToLunar(birthDate);
    lunarMonth = lunar ? lunar.month : 1;  // 公历输入，从转换结果取农历月份
    lunarDay = lunar ? lunar.day : day;
    info.inputSolar = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    if (lunar) {
      info.inputLunar = `${lunar.year}年${lunar.month}月${lunar.day}日${lunar.isLeapMonth ? '(闰)' : ''}`;
    } else {
      info.inputLunar = '查询失败';
    }
  }

  const bazi = getBazi(birthDate, hour);
  const weight = calcBoneWeight(bazi, lunarMonth, lunarDay);

  // 更新UI
  document.getElementById('bone-weight').textContent = formatWeight(weight.total);
  document.getElementById('bone-level').textContent = '年:' + weight.yw + ' + 月:' + weight.mw + ' + 日:' + weight.dw + ' + 时:' + weight.hw;
  weight_total_cached = weight.total;

  document.getElementById('bz-year').textContent = bazi.year;
  document.getElementById('bz-month').textContent = bazi.month;
  document.getElementById('bz-day').textContent = bazi.day;
  document.getElementById('bz-hour').textContent = bazi.hour;

  document.getElementById('wt-year').textContent = weight.yw + '两';
  document.getElementById('wt-month').textContent = weight.mw + '两';
  document.getElementById('wt-day').textContent = weight.dw + '两';
  document.getElementById('wt-hour').textContent = weight.hw + '两';

  document.getElementById('cm-title').textContent = formatWeight(weight.total) + ' · ' + (inputGender === 'female' ? '女命' : '男命') + '评语';
  document.getElementById('cm-text').textContent = getComment(weight.total);

  // 显示输入信息
  const hint = document.getElementById('input-info');
  if (hint) {
    hint.innerHTML = `公历：${info.inputSolar}<br>农历：${info.inputLunar}<br>时辰：${bazi.hourName}`;
  }

  // 显示结果卡片（带动画）
  const card = document.getElementById('result-card');
  card.classList.remove('result-card-animated');
  void card.offsetWidth;  // 强制重排，让动画重新触发
  card.style.display = 'block';
  card.classList.add('result-card-animated');
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // 更新 URL 参数（方便分享）
  setUrlParams();
}

// 洛书数→八卦映射
const TRIGRAM_MAP = {
  1: {name: '乾', binary: 7}, 2: {name: '兑', binary: 6},
  3: {name: '离', binary: 5}, 4: {name: '震', binary: 4},
  5: {name: '巽', binary: 3}, 6: {name: '坎', binary: 2},
  7: {name: '艮', binary: 1}, 0: {name: '坤', binary: 0}
};

// 十二时辰
const CHEN_PERIODS = [
  {num: 1, name: '子时', range: '23:00-01:00'},
  {num: 2, name: '丑时', range: '01:00-03:00'},
  {num: 3, name: '寅时', range: '03:00-05:00'},
  {num: 4, name: '卯时', range: '05:00-07:00'},
  {num: 5, name: '辰时', range: '07:00-09:00'},
  {num: 6, name: '巳时', range: '09:00-11:00'},
  {num: 7, name: '午时', range: '11:00-13:00'},
  {num: 8, name: '未时', range: '13:00-15:00'},
  {num: 9, name: '申时', range: '15:00-17:00'},
  {num: 10, name: '酉时', range: '17:00-19:00'},
  {num: 11, name: '戌时', range: '19:00-21:00'},
  {num: 12, name: '亥时', range: '21:00-23:00'}
];

let rollingInterval = null;
let rolling = false;
let slotValues = [0, 0, 0];
let slotStopped = [false, false, false];

function updateCurrentChen() {
  const h = new Date().getHours();
  let idx;
  if (h >= 23 || h < 1) idx = 0;
  else if (h < 3) idx = 1;
  else if (h < 5) idx = 2;
  else if (h < 7) idx = 3;
  else if (h < 9) idx = 4;
  else if (h < 11) idx = 5;
  else if (h < 13) idx = 6;
  else if (h < 15) idx = 7;
  else if (h < 17) idx = 8;
  else if (h < 19) idx = 9;
  else if (h < 21) idx = 10;
  else idx = 11;
  const chen = CHEN_PERIODS[idx];
  const nEl = document.getElementById('chen-name');
  const rEl = document.getElementById('chen-range');
  if (nEl && rEl) { nEl.textContent = chen.name; rEl.textContent = '(' + chen.range + ')'; }
  return chen;
}

function startGua() { console.log("startGua called, rolling=", rolling);
  if (rolling) return;
  const question = document.getElementById('gua-question').value.trim();
  if (!question) { alert('请先输入您想问的事情'); return; }
  rolling = true;
  document.getElementById('btn-start').style.display = 'none';
  document.getElementById('btn-stop').style.display = 'block';
  document.getElementById('gua-result').style.display = 'none';
  slotStopped = [false, false, false];
  slotValues = [0, 0, 0];
  const slots = [document.getElementById('slot1'), document.getElementById('slot2'), document.getElementById('slot3')];
  slots.forEach(function(s) { s.classList.add('spinning'); s.classList.remove('stopped'); });
  rollingInterval = setInterval(function() {
    for (var i = 0; i < 3; i++) {
      if (!slotStopped[i]) {
        slotValues[i] = Math.floor(Math.random() * 99) + 1;
        slots[i].textContent = slotValues[i];
      }
    }
  }, 60);
}

function stopGua() { console.log("stopGua called");
  if (!rolling) return;
  rolling = false;
  if (rollingInterval) { clearInterval(rollingInterval); rollingInterval = null; }
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('btn-start').style.display = 'block';
  var slots = [document.getElementById('slot1'), document.getElementById('slot2'), document.getElementById('slot3')];
  slots.forEach(function(s) { s.classList.remove('spinning'); s.classList.add('stopped'); });
  var chen = updateCurrentChen();
  calculateHexagram(slotValues[0], slotValues[1], slotValues[2], chen.num);
}

function calculateHexagram(num1, num2, num3, chenNum) { console.log("calculateHexagram:", num1, num2, num3, chenNum);
  var upperRem = num1 % 8;
  var upperTri = TRIGRAM_MAP[upperRem];
  var lowerRem = num2 % 8;
  var lowerTri = TRIGRAM_MAP[lowerRem];
  var movingLine = (num3 + chenNum) % 6;
  if (movingLine === 0) movingLine = 6;
  var hexBinary = (upperTri.binary << 3) | lowerTri.binary;
  var hexNum = HEX_LOOKUP[hexBinary];
  var hexData = HEX_DATA[hexNum];
  var changingBit = movingLine - 1;
  var changedBinary = hexBinary ^ (1 << changingBit);
  var changedHexNum = HEX_LOOKUP[changedBinary];
  var changedData = HEX_DATA[changedHexNum];
  renderGuaResult(hexData, movingLine, changedData, num1, num2, num3, upperTri, lowerTri, chenNum);
}

function renderGuaResult(hexData, movingLine, changedData, num1, num2, num3, upperTri, lowerTri, chenNum) {
  var question = document.getElementById('gua-question').value.trim();
  document.getElementById('gua-result').style.display = 'block';
  var chen = CHEN_PERIODS[chenNum - 1];
  var bin = 0;
  for (var i = 0; i < 64; i++) { if (HEX_LOOKUP[i] === hexData[0]) { bin = i; break; } }
  var lines = [];
  for (var i = 0; i < 6; i++) lines.push((bin >> i) & 1);
  var chBin = 0;
  if (changedData) { for (var i = 0; i < 64; i++) { if (HEX_LOOKUP[i] === changedData[0]) { chBin = i; break; } } }
  else { chBin = bin; }
  var chLines = [];
  for (var i = 0; i < 6; i++) chLines.push((chBin >> i) & 1);

  var html = '';
  html += '<div class="question-display"><div class="question-label">问事</div><div>' + question + '</div></div>';

  html += '<div style="font-size:11px;color:#6a5a4a;text-align:center;margin-bottom:10px;">';
  html += '时 ' + chen.name + ' ' + chen.range + ' &nbsp;|&nbsp; ';
  html += '数 ' + num1 + ' ' + num2 + ' ' + num3;
  html += '<br>上卦=' + upperTri.name + '(' + (num1 % 8 === 0 ? 8 : num1 % 8) + ')';
  html += ' 下卦=' + lowerTri.name + '(' + (num2 % 8 === 0 ? 8 : num2 % 8) + ')';
  html += ' 动爻=' + movingLine;
  html += '</div>';

  html += '<div class="dual-hex">';

  // 本卦
  html += '<div class="hex-box">';
  html += '<div class="hex-num">本卦 第' + hexData[0] + '卦</div>';
  html += '<div class="hex-name">' + hexData[1] + '</div>';
  html += '<div class="hexagram-lines">';
  for (var i = 5; i >= 0; i--) {
    var isMoving = (i + 1 === movingLine);
    html += '<div class="hex-line ' + (isMoving ? 'changing' : '') + '">';
    html += '<span class="line-label">' + (i+1) + '</span>';
    if (lines[i] === 1) { html += '<div class="line-yang"></div>'; }
    else { html += '<div class="line-yin"></div>'; }
    if (isMoving) html += '<span style="font-size:10px;color:#d4a04a;">●</span>';
    html += '</div>';
  }
  html += '</div></div>';

  // 箭头+变卦
  if (changedData && movingLine > 0) {
    html += '<div class="hex-change-arrow">→</div>';
    html += '<div class="hex-box">';
    html += '<div class="hex-num">变卦 第' + changedData[0] + '卦</div>';
    html += '<div class="hex-name">' + changedData[1] + '</div>';
    html += '<div class="hexagram-lines">';
    for (var i = 5; i >= 0; i--) {
      html += '<div class="hex-line">';
      html += '<span class="line-label">' + (i+1) + '</span>';
      if (chLines[i] === 1) { html += '<div class="line-yang"></div>'; }
      else { html += '<div class="line-yin"></div>'; }
      if (i+1 === movingLine) html += '<span style="font-size:10px;color:#d4a04a;opacity:0.5;">○</span>';
      html += '</div>';
    }
    html += '</div></div>';
  }
  html += '</div>'; // end dual-hex

  // 动爻提示
  if (movingLine > 0) {
    html += '<div class="changing-info">第' + movingLine + '爻动 → 本卦变' + changedData[1] + '</div>';
  } else {
    html += '<div class="changing-info">无动爻，以本卦为主</div>';
  }
  document.getElementById('hex-display').innerHTML = html;

  // 卦辞
  var jHtml = '<div class="hex-divider"></div>';
  jHtml += '<div class="hex-judgment-label">本卦「' + hexData[1] + '」卦辞</div>';
  jHtml += '<div>' + hexData[2] + '</div>';
  if (changedData) {
    jHtml += '<div class="hex-divider"></div>';
    jHtml += '<div class="hex-judgment-label">变卦「' + changedData[1] + '」卦辞</div>';
    jHtml += '<div>' + changedData[2] + '</div>';
  }
  jHtml += '<div class="hex-divider"></div>';
  jHtml += '<div style="font-size:11px;color:#6a5a4a;text-align:center;margin-top:10px;">';
  jHtml += '【解卦要点】本卦为当前状态，变卦为发展结果，动爻为关键节点。<br>';
  jHtml += '爻动则变，静则守。多爻动以本卦为主，一爻动以该爻为准。';
  jHtml += '</div>';
  document.getElementById('hex-judgment').innerHTML = jHtml;

  setTimeout(function() {
    var el = document.getElementById('gua-card');
    if (el) el.scrollIntoView({behavior: 'smooth', block: 'start'});
  }, 100);
}

  updateCurrentChen();

  } else {

  errDiv.textContent = '初始化错误: ' + e.message + '。请截图此信息并联系开发者。';
  document.body.insertBefore(errDiv, document.body.firstChild);
}
